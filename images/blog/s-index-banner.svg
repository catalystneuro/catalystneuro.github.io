<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="The S-Index: FAIR-Enhanced Data Sharing Index">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(234 63% 16%)"/>
      <stop offset="60%" stop-color="hsl(216 70% 24%)"/>
      <stop offset="100%" stop-color="hsl(203 79% 37%)"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="22%" r="55%">
      <stop offset="0%" stop-color="hsl(203 79% 55%)" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="hsl(203 79% 55%)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>

  <!-- ranked-dataset scatter / h-index style step curve -->
  <g transform="translate(760 70)" opacity="0.92">
    <line x1="0" y1="260" x2="360" y2="260" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="260" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
    <!-- y = x reference line -->
    <line x1="0" y1="260" x2="260" y2="0" stroke="white" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="6 6"/>
    <!-- descending impact-score bars -->
    <g fill="hsl(203 79% 62%)">
      <rect x="14"  y="40"  width="26" height="220" rx="4"/>
      <rect x="52"  y="78"  width="26" height="182" rx="4"/>
      <rect x="90"  y="104" width="26" height="156" rx="4"/>
      <rect x="128" y="128" width="26" height="132" rx="4"/>
      <rect x="166" y="150" width="26" height="110" rx="4" fill="hsl(199 89% 74%)"/>
      <rect x="204" y="176" width="26" height="84"  rx="4" fill="white" fill-opacity="0.55"/>
      <rect x="242" y="198" width="26" height="62"  rx="4" fill="white" fill-opacity="0.4"/>
      <rect x="280" y="222" width="26" height="38"  rx="4" fill="white" fill-opacity="0.3"/>
      <rect x="318" y="240" width="26" height="20"  rx="4" fill="white" fill-opacity="0.25"/>
    </g>
  </g>

  <!-- text block -->
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="80" y="150" fill="white" font-size="74" font-weight="700">The S-Index</text>
    <text x="82" y="205" fill="hsl(199 89% 80%)" font-size="30" font-weight="600">FAIR-Enhanced Data Sharing Index</text>
    <text x="82" y="250" fill="white" fill-opacity="0.8" font-size="22" font-weight="400">NIH S-Index Challenge &#183; Honorable Mention</text>
    <text x="82" y="286" fill="white" fill-opacity="0.6" font-size="20" font-weight="400">CatalystNeuro &#215; Lawrence Berkeley National Laboratory</text>
  </g>
</svg>
